<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>FITNESS LOG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--ac:#E8633A;--bg:#0d1117;--cb:#161b2e;--tx:#f0f2f7;--mu:#8890a4;--br:#222840;--red:#f87171;--tr-col:#4a9eff;--me-col:#8890a4;}
html,body{height:100%;background:var(--bg);}
body{font-family:-apple-system,'Hiragino Kaku Gothic ProN','Hiragino Sans',sans-serif;color:var(--tx);}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.hdr{background:var(--ac);padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.hdr-back{background:rgba(255,255,255,0.2);border:none;border-radius:8px;width:32px;height:32px;color:white;cursor:pointer;font-size:22px;line-height:1;display:flex;align-items:center;justify-content:center;}
.hdr-sub{color:rgba(255,255,255,0.65);font-size:11px;letter-spacing:.06em;}
.hdr-title{color:white;font-size:17px;font-weight:600;}
.card{background:var(--cb);border-radius:12px;border:.5px solid var(--br);padding:13px 14px;margin:8px 14px 0;}
.label{color:var(--mu);font-size:11px;letter-spacing:.05em;margin:0 0 5px;display:block;}
.inp{width:100%;background:var(--cb);border:.5px solid var(--br);border-radius:10px;color:var(--tx);font-size:15px;padding:10px 12px;font-family:inherit;-webkit-appearance:none;outline:none;}
.inp:focus{border-color:var(--ac);}
textarea.inp{resize:none;line-height:1.6;}
select.inp{cursor:pointer;}
.btn{width:100%;padding:13px;background:var(--ac);border:none;border-radius:12px;color:white;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn:active{opacity:.8;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-ghost{background:none;border:.5px solid var(--br);color:var(--mu);}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:8px;width:auto;cursor:pointer;font-family:inherit;border:none;}
/* バッジ：記録種別 */
.by-trainer{font-size:11px;padding:2px 8px;border-radius:20px;display:inline-block;background:rgba(74,158,255,.15);color:var(--tr-col);}
.by-member{font-size:11px;padding:2px 8px;border-radius:20px;display:inline-block;background:rgba(136,144,164,.13);color:var(--me-col);}
/* バッジ：筋トレ種目 */
.ex-badge{font-size:11px;padding:3px 9px;border-radius:20px;background:rgba(232,99,58,.13);color:var(--ac);display:inline-block;}
/* バッジ：有酸素種目 */
.cardio-badge{font-size:11px;padding:3px 9px;border-radius:20px;background:rgba(80,200,120,.12);color:#50c878;display:inline-block;}
.ex-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px;}
.ex-label{color:var(--mu);font-size:10px;margin:0 0 4px;display:block;}
.ex-inp{width:100%;background:var(--bg);border:.5px solid var(--br);border-radius:8px;color:var(--tx);font-size:14px;padding:7px 6px;font-family:inherit;text-align:center;-webkit-appearance:none;outline:none;}
.ex-inp:focus{border-color:var(--ac);}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:80px;}
.auth-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 22px;}
.auth-logo{text-align:center;margin-bottom:36px;}
.auth-logo-mark{font-size:40px;margin-bottom:8px;}
.auth-logo-title{font-size:26px;font-weight:700;color:var(--ac);letter-spacing:.05em;}
.auth-logo-sub{color:var(--mu);font-size:13px;margin-top:6px;}
.auth-field{margin-bottom:14px;}
.auth-toggle{text-align:center;margin-top:18px;color:var(--mu);font-size:14px;}
.auth-toggle a{color:var(--ac);cursor:pointer;}
.err{color:#f87171;font-size:13px;margin:6px 0;min-height:18px;}
.fab{position:fixed;bottom:28px;right:calc(50% - 240px + 16px);width:54px;height:54px;background:var(--ac);border:none;border-radius:50%;color:white;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
@media(max-width:480px){.fab{right:16px;}}
.empty{text-align:center;padding:40px 20px;color:var(--mu);}
.dtable{width:100%;border-collapse:collapse;}
.dtable th{color:var(--mu);font-size:11px;font-weight:400;padding-bottom:8px;text-align:left;}
.dtable td{font-size:14px;padding:9px 0;border-bottom:.5px solid var(--br);color:var(--tx);}
.dtable td.c{text-align:center;color:var(--mu);font-size:13px;}
.dtable td.r{text-align:right;color:var(--ac);font-size:13px;}
.loading{flex:1;display:flex;align-items:center;justify-content:center;color:var(--mu);font-size:14px;}
.spinner{width:28px;height:28px;border:2px solid var(--br);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;margin-right:10px;}
@keyframes spin{to{transform:rotate(360deg);}}
#toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#2a3a50;color:var(--tx);padding:10px 20px;border-radius:24px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:999;border:.5px solid var(--br);}
#toast.show{opacity:1;}
.member-card{background:var(--cb);border-radius:12px;border:.5px solid var(--br);margin:12px 14px 0;overflow:hidden;}
.member-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;}
.member-hdr-name{font-size:15px;font-weight:600;margin-bottom:2px;}
.member-hdr-count{font-size:12px;color:var(--mu);}
.member-hdr-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.btn-exit{background:rgba(248,113,113,.12);border:.5px solid rgba(248,113,113,.35);color:var(--red);border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-add-member{background:rgba(232,99,58,.12);border:.5px solid rgba(232,99,58,.35);color:var(--ac);border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.arrow{color:var(--mu);font-size:18px;transition:transform .2s;}
.arrow.open{transform:rotate(90deg);}
.member-body{display:none;border-top:.5px solid var(--br);padding:8px;}
.member-body.open{display:block;}
.date-label{font-size:11px;color:var(--mu);letter-spacing:.05em;padding:8px 4px 4px;}
.sess-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px;}
.sess-card{flex:1;background:var(--bg);border-radius:10px;border:.5px solid var(--br);padding:10px 12px;cursor:pointer;}
.sess-card:active{opacity:.75;}
.btn-del{background:none;border:none;color:var(--mu);cursor:pointer;font-size:20px;padding:6px;flex-shrink:0;margin-top:2px;}
.ex-detail-row{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap;}
.ex-detail-item{font-size:12px;color:var(--mu);}
.tc-box{margin-top:12px;background:rgba(74,158,255,.06);border-radius:10px;border:.5px solid rgba(74,158,255,.2);padding:11px 12px;}
.tc-label{color:var(--tr-col);font-size:11px;letter-spacing:.05em;margin:0 0 5px;display:block;}
.del-zone{margin-top:20px;padding-top:16px;border-top:.5px solid var(--br);}
.btn-danger{background:rgba(248,113,113,.15);border:.5px solid rgba(248,113,113,.4);color:var(--red);border-radius:8px;padding:10px 18px;font-size:13px;cursor:pointer;font-family:inherit;}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.confirm-box{background:#1a2035;border-radius:16px;border:.5px solid var(--br);padding:24px;width:100%;max-width:320px;}
.confirm-title{font-size:16px;font-weight:600;margin-bottom:10px;color:var(--red);}
.confirm-msg{font-size:14px;color:var(--mu);line-height:1.6;margin-bottom:20px;}
.confirm-btns{display:flex;gap:10px;}
.confirm-btns button{flex:1;padding:11px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.confirm-cancel{background:var(--br);color:var(--tx);}
.confirm-ok{background:var(--red);color:white;}
.type-tabs{display:flex;gap:6px;margin-bottom:10px;}
.type-tab{flex:1;padding:9px;border-radius:8px;border:.5px solid var(--br);background:none;color:var(--mu);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s;}
.type-tab.active{background:var(--ac);border-color:var(--ac);color:white;font-weight:600;}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div>読み込み中...</div></div>
<div id="toast"></div>
<script>
const SUPABASE_URL  = 'https://lidbmsafqefqancrgkyv.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxpZGJtc2FmcWVmcWFuY3Jna3l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjA3MDgsImV4cCI6MjA5MDc5NjcwOH0.aYRlWVLRb9ZcxC9Uz9RFXrZ3W0e0rhvCSuU34EDIeG4';

var accessToken=null,currentUser=null,profile=null;
var sessions=[],members=[];
var selectedSession=null;
var authMode='login';
var addExercises=[mkEx()];
var isSaving=false;
var pendingDelete=null;
var preselectedMemberId=null;
var openAccordions={}; // 開いているアコーディオンを記憶

function mkEx(){return {type:'weight',name:'',sets:3,reps:10,weight:0,duration:0};}
function mkCardio(){return {type:'cardio',name:'',sets:1,reps:0,weight:0,duration:10};}
function today(){return new Date().toISOString().slice(0,10);}

async function sbFetch(method,path,body,token,extra){
  var h={'apikey':SUPABASE_ANON,'Authorization':'Bearer '+(token||SUPABASE_ANON),'Content-Type':'application/json'};
  if(method==='POST'&&path.startsWith('/rest/'))h['Prefer']='return=representation';
  if(extra)Object.assign(h,extra);
  var res=await fetch(SUPABASE_URL+path,{method:method,headers:h,body:body?JSON.stringify(body):undefined});
  var text=await res.text();
  var data=text?JSON.parse(text):null;
  if(!res.ok)throw new Error((data&&(data.error_description||data.message||data.msg))||('エラー: '+res.status));
  return data;
}

function saveToken(t,u){accessToken=t;try{localStorage.setItem('fl_token',t);localStorage.setItem('fl_uid',u);}catch(e){}}
function clearToken(){accessToken=null;try{localStorage.removeItem('fl_token');localStorage.removeItem('fl_uid');}catch(e){}}
function loadToken(){try{return{token:localStorage.getItem('fl_token'),uid:localStorage.getItem('fl_uid')};}catch(e){return{};}}

function showConfirm(title,msg,cb){
  pendingDelete=cb;
  var o=document.createElement('div');o.className='confirm-overlay';o.id='conf';
  o.innerHTML='<div class="confirm-box"><div class="confirm-title">'+esc(title)+'</div><div class="confirm-msg">'+esc(msg)+'</div><div class="confirm-btns"><button class="confirm-cancel" onclick="hideConfirm()">キャンセル</button><button class="confirm-ok" onclick="doDelete()">削除する</button></div></div>';
  document.body.appendChild(o);
}
function hideConfirm(){var e=document.getElementById('conf');if(e)e.remove();pendingDelete=null;}
function doDelete(){hideConfirm();if(pendingDelete)pendingDelete();}

async function signUp(){
  var email=v('a-email'),pass=v('a-pass'),name=v('a-name');
  if(!email||!pass||!name){setErr('a-err','すべての項目を入力してください');return;}
  if(pass.length<6){setErr('a-err','パスワードは6文字以上にしてください');return;}
  setErr('a-err','');
  try{await sbFetch('POST','/auth/v1/signup',{email:email,password:pass,data:{name:name}});toast('確認メールを送りました。確認後ログインしてください。');authMode='login';render('auth');}
  catch(e){setErr('a-err',e.message);}
}
async function signIn(){
  var email=v('a-email'),pass=v('a-pass');
  if(!email||!pass){setErr('a-err','メールアドレスとパスワードを入力してください');return;}
  setErr('a-err','');
  try{var d=await sbFetch('POST','/auth/v1/token?grant_type=password',{email:email,password:pass});saveToken(d.access_token,d.user.id);currentUser=d.user;await loadProfile();}
  catch(e){setErr('a-err','メールアドレスまたはパスワードが違います');}
}
async function signOut(){
  try{await sbFetch('POST','/auth/v1/logout',{},accessToken);}catch(e){}
  clearToken();currentUser=null;profile=null;render('auth');
}

async function loadProfile(){
  var d=await sbFetch('GET','/rest/v1/profiles?id=eq.'+currentUser.id+'&select=*',null,accessToken);
  if(!d||!d.length){render('auth');return;}
  profile=d[0];
  if(profile.role==='trainer'){await Promise.all([loadMembers(),loadTrainerSessions()]);}
  else{await loadMemberSessions();}
  render('list');
}
async function loadTrainerSessions(){
  var d=await sbFetch('GET','/rest/v1/training_sessions?select=*,member:profiles!member_id(id,name),trainer:profiles!trainer_id(name),exercises(*)&order=session_date.desc',null,accessToken);
  sessions=(d||[]).map(function(s){return Object.assign({},s,{exercises:(s.exercises||[]).sort(function(a,b){return a.sort_order-b.sort_order;})});});
}
async function loadMemberSessions(){
  var d=await sbFetch('GET','/rest/v1/training_sessions?member_id=eq.'+currentUser.id+'&select=*,trainer:profiles!trainer_id(name),exercises(*)&order=session_date.desc',null,accessToken);
  sessions=(d||[]).map(function(s){return Object.assign({},s,{exercises:(s.exercises||[]).sort(function(a,b){return a.sort_order-b.sort_order;})});});
}
async function loadMembers(){
  var d=await sbFetch('GET','/rest/v1/profiles?role=eq.member&select=id,name&order=name',null,accessToken);
  members=d||[];
}

async function deleteSession(id){
  try{
    await sbFetch('DELETE','/rest/v1/exercises?session_id=eq.'+id,null,accessToken);
    await sbFetch('DELETE','/rest/v1/training_sessions?id=eq.'+id,null,accessToken);
    sessions=sessions.filter(function(s){return s.id!==id;});
    toast('記録を削除しました');render('list');
  }catch(e){toast('削除に失敗しました');}
}
async function deleteMember(id){
  try{
    var ms=sessions.filter(function(s){return s.member&&s.member.id===id;});
    for(var i=0;i<ms.length;i++){await sbFetch('DELETE','/rest/v1/exercises?session_id=eq.'+ms[i].id,null,accessToken);}
    await sbFetch('DELETE','/rest/v1/training_sessions?member_id=eq.'+id,null,accessToken);
    await sbFetch('DELETE','/rest/v1/profiles?id=eq.'+id,null,accessToken);
    sessions=sessions.filter(function(s){return !s.member||s.member.id!==id;});
    members=members.filter(function(m){return m.id!==id;});
    toast('会員を削除しました');render('list');
  }catch(e){toast('削除に失敗しました: '+e.message);}
}

async function saveSession_(){
  if(isSaving)return;
  var isTr=profile.role==='trainer';
  var memberId=isTr?(preselectedMemberId||v('f-member')):currentUser.id;
  var trainerId=isTr?currentUser.id:null;
  var date=v('f-date'),note=v('f-note');
  if(isTr&&!memberId){setErr('f-err','会員を選択してください');return;}
  if(!date){setErr('f-err','日付を入力してください');return;}
  var exRows=[];
  document.querySelectorAll('.ex-row').forEach(function(_,i){
    var name=(v('en'+i)||'').trim();
    var type=v('et'+i)||'weight';
    if(name){
      if(type==='cardio'){
        exRows.push({name:name,type:'cardio',sets:1,reps:0,weight:0,duration:+(v('edu'+i)||10),sort_order:i});
      } else {
        exRows.push({name:name,type:'weight',sets:+(v('es'+i)||3),reps:+(v('er'+i)||10),weight:+(v('ew'+i)||0),duration:0,sort_order:i});
      }
    }
  });
  if(!exRows.length){setErr('f-err','種目を1つ以上入力してください');return;}
  isSaving=true;
  var btn=document.getElementById('save-btn');
  if(btn){btn.disabled=true;btn.textContent='保存中...';}
  try{
    var body={member_id:memberId,session_date:date,note:note};
    if(trainerId)body.trainer_id=trainerId;
    var sess=await sbFetch('POST','/rest/v1/training_sessions',body,accessToken);
    var sessId=Array.isArray(sess)?sess[0].id:sess.id;
    await sbFetch('POST','/rest/v1/exercises',exRows.map(function(e){return Object.assign({},e,{session_id:sessId});}),accessToken);
    toast('セッションを記録しました');
    if(isTr){await loadTrainerSessions();}else{await loadMemberSessions();}
    preselectedMemberId=null;render('list');
  }catch(e){setErr('f-err','保存に失敗しました: '+e.message);if(btn){btn.disabled=false;btn.textContent='記録を保存';}}
  isSaving=false;
}

async function saveComment(id){
  var c=v('tc-inp');
  try{
    await sbFetch('PATCH','/rest/v1/training_sessions?id=eq.'+id,{trainer_comment:c},accessToken,{'Prefer':'return=minimal'});
    var s=sessions.find(function(s){return s.id===id;});if(s)s.trainer_comment=c;
    if(selectedSession)selectedSession.trainer_comment=c;
    toast('コメントを保存しました');
    var btn=document.getElementById('tc-btn');
    if(btn){btn.textContent='保存済み ✓';setTimeout(function(){if(btn)btn.textContent='保存する';},2000);}
  }catch(e){toast('保存に失敗しました');}
}

function exSummaryHtml(exercises){
  return (exercises||[]).map(function(e){
    if(e.type==='cardio'){
      return '<div class="ex-detail-row">'+
        '<span class="cardio-badge">'+esc(e.name)+'</span>'+
        '<span class="ex-detail-item">'+e.duration+'分</span>'+
        '</div>';
    } else {
      var wt=e.weight>0?e.weight+'kg':'自重';
      return '<div class="ex-detail-row">'+
        '<span class="ex-badge">'+esc(e.name)+'</span>'+
        '<span class="ex-detail-item">'+e.sets+'セット × '+e.reps+'回 / '+wt+'</span>'+
        '</div>';
    }
  }).join('');
}

function groupByDate(list){
  var grouped={};var order=[];
  list.forEach(function(s){
    var d=s.session_date;
    if(!grouped[d]){grouped[d]=[];order.push(d);}
    grouped[d].push(s);
  });
  return {grouped:grouped,order:order};
}

function sessCardHtml(s){
  var byLabel=s.trainer_id?'<span class="by-trainer">トレーナー記録</span>':'<span class="by-member">本人記録</span>';
  var hc=s.trainer_comment?' 💬':'';
  var exHtml=exSummaryHtml(s.exercises);
  return '<div class="sess-row">'+
    '<div class="sess-card" onclick="openDetail(\''+s.id+'\')">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">'+
    '<div>'+byLabel+'</div>'+
    '<span style="font-size:11px;color:var(--mu);">'+hc+'</span></div>'+
    exHtml+'</div>'+
    '<button class="btn-del" onclick="showConfirm(\'記録を削除\',\'この記録を削除しますか？\',function(){deleteSession(\''+s.id+'\');})">🗑</button>'+
    '</div>';
}

function render(v_){
  var app=document.getElementById('app');if(!app)return;
  var map={auth:rAuth,list:rList,detail:rDetail,add:rAdd};
  app.innerHTML=map[v_]?map[v_]():'';
  if(v_==='list')restoreAccordions();
}

function rAuth(){
  var isLogin=authMode==='login';
  return '<div class="auth-wrap">'+
    '<div class="auth-logo"><div class="auth-logo-mark">💪</div><div class="auth-logo-title">FITNESS LOG</div><div class="auth-logo-sub">トレーニング記録・共有アプリ</div></div>'+
    (isLogin?'':fld('a-name','text','お名前','山田 太郎'))+
    fld('a-email','email','メールアドレス','mail@example.com')+
    fld('a-pass','password','パスワード',isLogin?'':'6文字以上')+
    '<p class="err" id="a-err"></p>'+
    '<button class="btn" onclick="'+(isLogin?'signIn()':'signUp()')+'">'+( isLogin?'ログイン':'新規登録')+'</button>'+
    '<p class="auth-toggle">'+(isLogin?'アカウントをお持ちでない方は':'すでにアカウントをお持ちの方は')+' <a onclick="toggleAuth()">'+(isLogin?'新規登録':'ログイン')+'</a></p></div>';
}

function rList(){
  var isTr=profile.role==='trainer';
  var hd='<div class="hdr"><div style="flex:1"><div class="hdr-sub">'+(isTr?'TRAINER':'MEMBER')+'</div><div class="hdr-title">'+esc(profile.name)+'</div></div>'+
    '<button onclick="signOut()" style="background:rgba(255,255,255,.18);border:none;border-radius:8px;padding:6px 12px;color:white;font-size:12px;cursor:pointer;">ログアウト</button></div>';
  var body='';
  if(isTr){
    var grouped={};var order=[];
    sessions.forEach(function(s){
      var mid=s.member&&s.member.id?s.member.id:'unknown';
      var mname=s.member&&s.member.name?s.member.name:'不明';
      if(!grouped[mid]){grouped[mid]={name:mname,id:mid,sessions:[]};order.push(mid);}
      grouped[mid].sessions.push(s);
    });
    members.forEach(function(m){
      if(!grouped[m.id]){grouped[m.id]={name:m.name,id:m.id,sessions:[]};order.push(m.id);}
    });
    if(!order.length){
      body='<div class="empty"><p style="font-size:40px;margin-bottom:14px">💪</p><p>会員がいません</p></div>';
    } else {
      body=order.map(function(mid){
        var g=grouped[mid];
        var dg=groupByDate(g.sessions);
        var sessHtml=dg.order.map(function(date){
          var rows=dg.grouped[date].map(sessCardHtml).join('');
          return '<div><div class="date-label">'+date+'</div>'+rows+'</div>';
        }).join('');
        var noRec=g.sessions.length===0?'<p style="color:var(--mu);font-size:13px;padding:6px 4px;">記録なし</p>':'';
        return '<div class="member-card">'+
          '<div class="member-hdr" onclick="toggleMember(\'mb_'+mid+'\')">'+
          '<div style="flex:1;"><div class="member-hdr-name">'+esc(g.name)+'</div>'+
          '<div class="member-hdr-count">'+g.sessions.length+'件'+(g.sessions.length?' · 最新: '+g.sessions[0].session_date:'')+'</div></div>'+
          '<div class="member-hdr-right">'+
          '<button class="btn-add-member" onclick="event.stopPropagation();openAddForMember(\''+mid+'\')">＋記録</button>'+
          '<button class="btn-exit" onclick="event.stopPropagation();showConfirm(\'会員を削除\',\''+esc(g.name)+'さんのアカウントと全記録を削除しますか？\',function(){deleteMember(\''+mid+'\');})">退会</button>'+
          '<span class="arrow" id="arr_mb_'+mid+'">›</span></div></div>'+
          '<div class="member-body" id="mb_'+mid+'">'+sessHtml+noRec+'</div></div>';
      }).join('');
    }
  } else {
    if(!sessions.length){
      body='<div class="empty"><p style="font-size:40px;margin-bottom:14px">💪</p><p>記録がありません</p><p style="font-size:13px;margin-top:8px;">右下の＋から記録を追加</p></div>';
    } else {
      var dg=groupByDate(sessions);
      body=dg.order.map(function(date){
        var rows=dg.grouped[date].map(sessCardHtml).join('');
        return '<div style="margin:12px 14px 0;"><div style="font-size:12px;color:var(--mu);letter-spacing:.05em;margin-bottom:4px;">'+date+'</div>'+rows+'</div>';
      }).join('');
    }
  }
  return hd+'<div class="scroll">'+body+'</div><button class="fab" onclick="openAdd()">＋</button>';
}

function toggleMember(id){
  var el=document.getElementById(id);var arr=document.getElementById('arr_'+id);
  if(!el)return;
  el.classList.toggle('open');
  if(arr)arr.classList.toggle('open');
  openAccordions[id]=el.classList.contains('open');
}

function restoreAccordions(){
  Object.keys(openAccordions).forEach(function(id){
    if(openAccordions[id]){
      var el=document.getElementById(id);var arr=document.getElementById('arr_'+id);
      if(el)el.classList.add('open');
      if(arr)arr.classList.add('open');
    }
  });
}

function rDetail(){
  var s=selectedSession;if(!s)return rList();
  var isTr=profile.role==='trainer';
  var byLabel=s.trainer_id?'<span class="by-trainer">トレーナー記録</span>':'<span class="by-member">本人記録</span>';
  var subLine=s.session_date+(isTr?' · '+esc(s.member&&s.member.name||'—'):'');
  var rows=(s.exercises||[]).map(function(e){
    if(e.type==='cardio'){
      return '<tr><td><span class="cardio-badge">'+esc(e.name)+'</span></td>'+
        '<td class="c" colspan="2">有酸素</td>'+
        '<td class="r">'+e.duration+'分</td></tr>';
    } else {
      return '<tr><td>'+esc(e.name)+'</td><td class="c">'+e.sets+'セット</td><td class="c">'+e.reps+'回</td>'+
        '<td class="r">'+(e.weight>0?e.weight+'kg':'自重')+'</td></tr>';
    }
  }).join('');
  var note=s.note?'<div class="card" style="margin-top:12px"><span class="label">メモ</span><p style="font-size:14px;line-height:1.7;margin-top:4px">'+esc(s.note)+'</p></div>':'';
  var commentBox='';
  if(isTr){
    commentBox='<div class="tc-box" style="margin-top:12px"><span class="tc-label">トレーナーコメント</span>'+
      '<textarea id="tc-inp" class="inp" rows="3" placeholder="会員へのコメントを入力...">'+esc(s.trainer_comment||'')+'</textarea>'+
      '<button id="tc-btn" class="btn-sm" style="margin-top:8px;background:var(--ac);color:white;" onclick="saveComment(\''+s.id+'\')">保存する</button></div>';
  } else if(s.trainer_comment){
    commentBox='<div class="tc-box" style="margin-top:12px"><span class="tc-label">トレーナーからのコメント</span><p style="font-size:14px;line-height:1.7;margin-top:4px;color:var(--tx);">'+esc(s.trainer_comment)+'</p></div>';
  }
  var delBtn='<div class="del-zone"><button class="btn-danger" onclick="showConfirm(\'記録を削除\',\'この記録を削除しますか？この操作は取り消せません。\',function(){deleteSession(\''+s.id+'\');})">この記録を削除する</button></div>';
  return '<div class="hdr"><button class="hdr-back" onclick="render(\'list\')">‹</button>'+
    '<div><div class="hdr-sub">'+subLine+'</div><div class="hdr-title">トレーニング記録'+byLabel+'</div></div></div>'+
    '<div class="scroll" style="padding:14px"><span class="label">トレーニング内容</span>'+
    '<div class="card" style="margin:6px 0 0;padding:12px 13px"><table class="dtable">'+
    '<thead><tr><th>種目</th><th style="text-align:center">セット</th><th style="text-align:center">回数</th><th style="text-align:right">重量/時間</th></tr></thead>'+
    '<tbody>'+rows+'</tbody></table></div>'+note+commentBox+delBtn+'</div>';
}

function exRowHtml(ex, i){
  var isCardio=ex.type==='cardio';
  var details=isCardio
    ? '<div style="margin-top:8px;"><span class="ex-label">時間（分）</span><input id="edu'+i+'" class="ex-inp" type="number" value="'+(ex.duration||10)+'" min="1" style="max-width:100px;"></div>'
    : '<div class="ex-grid">'+
      '<div><span class="ex-label">セット</span><input id="es'+i+'" class="ex-inp" type="number" value="'+(ex.sets||3)+'" min="1"></div>'+
      '<div><span class="ex-label">回数</span><input id="er'+i+'" class="ex-inp" type="number" value="'+(ex.reps||10)+'" min="1"></div>'+
      '<div><span class="ex-label">重量(kg)</span><input id="ew'+i+'" class="ex-inp" type="number" value="'+(ex.weight||0)+'" min="0"></div>'+
      '</div>';
  return '<div class="card ex-row" style="margin:0 0 8px" id="exrow_'+i+'">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
    '<span class="label">種目 '+(i+1)+'</span>'+
    (addExercises.length>1?'<button onclick="removeEx('+i+')" style="background:none;border:none;color:var(--mu);cursor:pointer;font-size:20px;line-height:1;padding:0">×</button>':'')+
    '</div>'+
    '<div class="type-tabs">'+
    '<button class="type-tab'+(isCardio?'':' active')+'" onclick="setExType('+i+',\'weight\')">筋トレ</button>'+
    '<button class="type-tab'+(isCardio?' active':'')+'" onclick="setExType('+i+',\'cardio\')">有酸素</button>'+
    '</div>'+
    '<input type="hidden" id="et'+i+'" value="'+(isCardio?'cardio':'weight')+'">'+
    '<input id="en'+i+'" class="inp" type="text" placeholder="'+(isCardio?'例：ウォーキング、ランニング':'例：ベンチプレス、スクワット')+'" style="margin-bottom:8px;">'+
    details+'</div>';
}

function setExType(i, type){
  addExercises[i].type=type;
  var row=document.getElementById('exrow_'+i);
  if(!row)return;
  var name=v('en'+i);
  addExercises[i].name=name;
  row.outerHTML=exRowHtml(addExercises[i],i);
  document.getElementById('en'+i).value=name;
}

function rAdd(){
  var isTr=profile.role==='trainer';
  var memberSection='';
  if(isTr){
    if(preselectedMemberId){
      var m=members.find(function(m){return m.id===preselectedMemberId;});
      var mname=m?m.name:'会員';
      memberSection='<div style="margin-bottom:13px"><span class="label">会員</span>'+
        '<div style="background:var(--cb);border:.5px solid var(--br);border-radius:10px;padding:10px 12px;font-size:15px;color:var(--tx);">'+esc(mname)+'</div></div>';
    } else {
      memberSection='<div style="margin-bottom:13px"><span class="label">会員</span><select id="f-member" class="inp"><option value="">選択してください</option>'+
        members.map(function(m){return '<option value="'+m.id+'">'+esc(m.name)+'</option>';}).join('')+'</select></div>';
    }
  }
  var rows=addExercises.map(function(ex,i){return exRowHtml(ex,i);}).join('');
  return '<div class="hdr"><button class="hdr-back" onclick="cancelAdd()">‹</button>'+
    '<div><div class="hdr-sub">'+(isTr?'TRAINER':'MEMBER')+'</div><div class="hdr-title">セッションを記録</div></div></div>'+
    '<div class="scroll" style="padding:14px">'+memberSection+
    '<div style="margin-bottom:13px"><span class="label">日付</span><input id="f-date" class="inp" type="date" value="'+today()+'"></div>'+
    '<div style="margin-bottom:13px"><span class="label">トレーニング種目</span><div style="margin-top:6px">'+rows+'</div>'+
    '<button onclick="addEx()" class="btn btn-ghost" style="margin-top:4px;margin-bottom:4px;">＋ 筋トレを追加</button>'+
    '<button onclick="addCardio()" class="btn btn-ghost" style="margin-top:4px;">＋ 有酸素を追加</button>'+
    '</div>'+
    '<div style="margin-bottom:20px"><span class="label">メモ・コメント</span>'+
    '<textarea id="f-note" class="inp" rows="3" placeholder="気づいたことや次回への申し送りなど..."></textarea></div>'+
    '<p class="err" id="f-err"></p><button id="save-btn" class="btn" onclick="saveSession_()">記録を保存</button></div>';
}

function fld(id,type,label,ph){return '<div class="auth-field"><span class="label">'+label+'</span><input id="'+id+'" class="inp" type="'+type+'" placeholder="'+ph+'"></div>';}
function v(id){var el=document.getElementById(id);return el?el.value:'';}
function setErr(id,msg){var el=document.getElementById(id);if(el)el.textContent=msg;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');}
function toast(msg){var t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
function toggleAuth(){authMode=authMode==='login'?'signup':'login';render('auth');}
function openDetail(id){selectedSession=sessions.find(function(s){return s.id===id;});render('detail');}
function openAdd(){preselectedMemberId=null;addExercises=[mkEx()];render('add');}
function openAddForMember(mid){preselectedMemberId=mid;addExercises=[mkEx()];render('add');}
function cancelAdd(){preselectedMemberId=null;render('list');}
function addEx(){addExercises.push(mkEx());render('add');}
function addCardio(){addExercises.push(mkCardio());render('add');}
function removeEx(i){addExercises.splice(i,1);render('add');}

(async function(){
  var done=false;
  setTimeout(function(){if(!done)render('auth');},3000);
  try{
    var stored=loadToken();
    if(stored.token&&stored.uid){
      accessToken=stored.token;
      try{var d=await sbFetch('GET','/auth/v1/user',null,accessToken);currentUser=d;await loadProfile();}
      catch(e){clearToken();render('auth');}
    } else {render('auth');}
  }catch(e){render('auth');}
  done=true;
})();
</script>
</body>
</html>
